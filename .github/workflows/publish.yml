name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Set version in .env
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/APP_ENV=.*/APP_ENV=production/" .env
          sed -i '' "s/APP_DEBUG=.*/APP_DEBUG=false/" .env
          sed -i '' "s/LOG_LEVEL=.*/LOG_LEVEL=error/" .env
          sed -i '' "s/NATIVEPHP_APP_VERSION=.*/NATIVEPHP_APP_VERSION=${VERSION}/" .env

      # Uncomment to enable Apple signing (requires APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD secrets)
      # - name: Install Apple signing certificate
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
      #     KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
      #     echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
      #     security create-keychain -p "" $KEYCHAIN_PATH
      #     security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
      #     security unlock-keychain -p "" $KEYCHAIN_PATH
      #     security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
      #     security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
      #     security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
      #     security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Fix electron-builder repo detection
        run: node -e "const p=JSON.parse(require('fs').readFileSync('vendor/nativephp/desktop/resources/electron/package.json','utf8')); p.repository={type:'git',url:'${{ github.server_url }}/${{ github.repository }}.git'}; require('fs').writeFileSync('vendor/nativephp/desktop/resources/electron/package.json', JSON.stringify(p, null, 4))"

      - name: Strip version from artifact names
        run: |
          sed -i '' "s/'-\${version}-setup.\${ext}'/'-setup.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i '' "s/'-\${version}-\${arch}.\${ext}'/'-\${arch}.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i '' "s/'-\${version}.\${ext}'/'.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: amber
          GITHUB_OWNER: ngiraud
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
          # Uncomment to enable notarization (requires Apple Developer account)
          # NATIVEPHP_APPLE_ID: ${{ secrets.NATIVEPHP_APPLE_ID }}
          # NATIVEPHP_APPLE_ID_PASS: ${{ secrets.NATIVEPHP_APPLE_ID_PASS }}
          # NATIVEPHP_APPLE_TEAM_ID: ${{ secrets.NATIVEPHP_APPLE_TEAM_ID }}
        run: php artisan native:publish mac --no-interaction

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Set version in .env
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/APP_ENV=.*/APP_ENV=production/" .env
          sed -i "s/APP_DEBUG=.*/APP_DEBUG=false/" .env
          sed -i "s/LOG_LEVEL=.*/LOG_LEVEL=error/" .env
          sed -i "s/NATIVEPHP_APP_VERSION=.*/NATIVEPHP_APP_VERSION=${VERSION}/" .env

      - name: Fix electron-builder repo detection
        run: node -e "const p=JSON.parse(require('fs').readFileSync('vendor/nativephp/desktop/resources/electron/package.json','utf8')); p.repository={type:'git',url:'${{ github.server_url }}/${{ github.repository }}.git'}; require('fs').writeFileSync('vendor/nativephp/desktop/resources/electron/package.json', JSON.stringify(p, null, 4))"

      - name: Strip version from artifact names
        run: |
          sed -i "s/'-\${version}-setup.\${ext}'/'-setup.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i "s/'-\${version}-\${arch}.\${ext}'/'-\${arch}.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs
          sed -i "s/'-\${version}.\${ext}'/'.\${ext}'/g" vendor/nativephp/desktop/resources/electron/electron-builder.mjs

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NATIVEPHP_UPDATER_PROVIDER: github
          GITHUB_REPO: amber
          GITHUB_OWNER: ngiraud
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_TYPE: draft
        run: php artisan native:publish linux --no-interaction

  publish-release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false --notes-from-tag --title "Amber ${{ github.ref_name }}" --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
